<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mim's Hobby Shop </title>
    <style>
        /* Modern reset and centering */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f6f6f6; /* Off-white background */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #1a1a1a;
        }

        .card {
            text-align: center;
            padding: 40px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
        }

        /* Discord Button Styling */
        .discord-btn {
            display: inline-flex;
            align-items: center;
            background-color: #5865F2; /* Discord Blurple */
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
        }

        .discord-btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
        }

        .discord-btn svg {
            margin-right: 10px;
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #aaa;
        }
        .discord-btn {
            display: inline-flex;       /* Keeps icon and text on one line */
            align-items: center;        /* Centers them vertically */
            justify-content: center;    /* Centers them horizontally */
            background-color: #5865F2; 
            color: white !important;    /* Forces text to be white */
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
        }
        
        .discord-btn svg {
            margin-right: 12px;
            width: 24px;               /* Fixed width for the icon */
            height: auto;
            flex-shrink: 0;            /* Prevents the icon from squishing the text */
        }
        
        .discord-btn span {
            white-space: nowrap;       /* Prevents text from wrapping to a second line */
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>We are closed!</h1>
        <p>Join our community for updates.</p>
        
        <a href="https://discord.gg/mSJZxJDHwk" class="discord-btn">

            &copy; 2026 Mimshobbyshop

    </div>

</body>
</html>
